<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Read Messages</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <img src="/static/logo.png" alt="logo" class="logo">
    <h1>All Messages</h1>
</header>

<nav>
    <a href="/">Home</a>
    <a href="/message">Message</a>
    <a href="/read">Read Messages</a>
</nav>

<main>

    <h2>Messages list</h2>

    {% if messages %}
        {% for time, data in messages.items() %}
            <div class="card">
                <p><b>Time:</b> {{ time }}</p>
                <p><b>User:</b> {{ data.username }}</p>
                <p><b>Message:</b> {{ data.message }}</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No messages yet</p>
    {% endif %}

</main>

</body>
</html>
